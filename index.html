<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Implementation Assignment</title>
    <style>
        
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: lightgray;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    .color-boxes {
      margin: 20px 0;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .box {
      width: 100px;
      height: 100px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
    }
    
    .red { color: #800000; }
    .blue { color: #003366; }
    .green {color: #004d00; }
    .yellow {color: #665c00; }

    
    .box:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .box red:hover{
            background-color: #ff6b6b;
        }
        
        .box blue:hover{
            background-color: #4dabf7;
        }

        .box green:hover{
            background-color: #51cf66;
        }

        .box yellow:hover{
            background-color: #ffd43b;
        }
      

    

    .user-input {
      margin-top: 20px;
    }

    input {
      padding: 8px;
      font-size: 16px;
    }

    button {
      padding: 8px 12px;
      font-size: 16px;
      background-color: lightblue;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: deepskyblue;
      color: white;
    }
        
    input:focus {
      outline: none;
      border-color: #4dabf7;
    }
        
      
    button:active {
      transform: translateY(0);
    }
        
        
        
        @media (max-width: 768px) {
            .color-boxes {
                justify-content: center;
            }
            
            .box {
                width: 120px;
                height: 120px;
            }
            
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="greeting">Hello</h1>
        </header>
        
        
        
        <div class="color-boxes">
            <div class="box red"  data-color="red">Red</div>
            <div class="box blue" data-color="blue">Blue</div>
            <div class="box green" data-color="green">Green</div>
            <div class="box yellow" data-color="yellow">Yellow</div>
        </div>
        
        <div class="user-input">
            <input type="text" id="nameInput" placeholder="Enter your name">
            <button id="greetButton">Greet Me</button>
        </div>
    </div>

    <script>
    
        const greetingElement = document.getElementById('greeting');
        const nameInput = document.getElementById('nameInput');
        const greetButton = document.getElementById('greetButton');
        const boxes = document.querySelectorAll('.box');
        
        
        greetButton.addEventListener('click', function() {
            const userName = nameInput.value.trim();
            
            if (userName) {
                greetingElement.textContent = `Hello, ${userName}!`;
                greetingElement.style.color = '#4dabf7';
            } else {
                greetingElement.textContent = 'Hello';
                greetingElement.style.color = '#333';
            }
        });
        
        
        boxes.forEach(box => {
            box.addEventListener('click', function() {
                const color = this.getAttribute('data-color');
                this.style.backgroundColor = color;
                
                setTimeout(() => {
                    this.style.backgroundColor = '';
                }, 10000);
            });
        });
    </script>
</body>

</html>
