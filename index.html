<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Implementation Assignment</title>
    <style>
     *{
    margin: 0;
    padding: 0;
}
.container{
    display:flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    width: 500px;
    padding: 12px;
    margin-top:10%;
    margin-left: auto;
    margin-right: auto;
}
.box{
    background-color:white;
    width: 100px;
    height: 100px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: black;
    font-size: 20px;
    box-shadow: 1px 2px 4px rgba(0,0,0,0.5);
}
#header{
    text-align: center;
    color: black;
    background-color: lightgrey;
    padding: 12px;
    font-size: 30px;
}
#form{
   display:flex;
   justify-content: center;
   align-items: center;
   margin-top: 40px;
}
#submit{
    padding:4px;
    background-color: rgb(197, 191, 191);
}
    </style>
</head>
<body>
    <header id="header">
         Hello     
    </header>
    <div class="container">
        <div class="box" id="box-1">RED</div>
        <div class="box" id="box-2">GREEN</div>
        <div class="box" id="box-3">BLUE</div>
        <div class="box" id="box-4">YELLOW</div>
    </div>
   <div id="form">
    <input type="text" id="input" placeholder="Enter name">
    <input type="submit" value="Submit" id="submit">
   </div>
   <script>
       const input =document.getElementById('input');
const button = document.getElementById('submit');
const header = document.getElementById('header');
button.addEventListener('click', () => {
    const name = input.value;
    header.textContent = "Hello " + name;
});
const box1 = document.getElementById('box-1');
const box2 = document.getElementById('box-2');
const box3 = document.getElementById('box-3');
const box4 = document.getElementById('box-4');

box1.addEventListener('click', () => {
    box1.style.backgroundColor = 'red';
});
box2.addEventListener('click', () => {
    box2.style.backgroundColor = 'green';
});
box3.addEventListener('click', () => {
    box3.style.backgroundColor = 'blue';
});

box4.addEventListener('click', () => {
    box4.style.backgroundColor = 'yellow';
});
   </script>
</body>
</html>
